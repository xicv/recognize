name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: arm64
            runner: macos-14
          - arch: x86_64
            runner: macos-13
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: brew install sdl2 cmake

      - name: Build recognize
        working-directory: src/cli
        run: |
          mkdir -p build && cd build
          cmake .. \
            -DWHISPER_COREML=ON \
            -DWHISPER_COREML_ALLOW_FALLBACK=ON \
            -DGGML_METAL=ON \
            -DGGML_METAL_EMBED_LIBRARY=ON \
            -DGGML_NATIVE=OFF \
            -DGGML_ACCELERATE=ON \
            -DGGML_BLAS=ON \
            -DGGML_LTO=ON \
            -DWHISPER_SDL2=ON \
            -DCMAKE_BUILD_TYPE=Release
          make -j$(sysctl -n hw.logicalcpu)

      - name: Verify binary
        working-directory: src/cli
        run: ./build/recognize --help

      - name: Package
        working-directory: src/cli
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          mkdir -p release
          cp build/recognize release/
          cd release
          tar czf "recognize-${TAG}-${{ matrix.arch }}.tar.gz" recognize
          shasum -a 256 *.tar.gz > "checksums-${{ matrix.arch }}.txt"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.arch }}
          path: src/cli/release/*

  create-release:
    needs: build
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create universal binary
        run: |
          TAG="${GITHUB_REF#refs/tags/}"

          # Extract binaries
          mkdir -p arm64 x86_64
          tar xzf "artifacts/release-arm64/recognize-${TAG}-arm64.tar.gz" -C arm64
          tar xzf "artifacts/release-x86_64/recognize-${TAG}-x86_64.tar.gz" -C x86_64

          # Create universal binary
          lipo -create arm64/recognize x86_64/recognize -output recognize-universal
          mkdir -p universal
          cp recognize-universal universal/recognize
          cd universal
          tar czf "recognize-${TAG}-universal.tar.gz" recognize
          cd ..

          # Collect all checksums
          cat artifacts/release-arm64/checksums-arm64.txt > checksums.txt
          cat artifacts/release-x86_64/checksums-x86_64.txt >> checksums.txt
          shasum -a 256 "universal/recognize-${TAG}-universal.tar.gz" >> checksums.txt

      - name: Bundle plugin
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          tar czf "recognize-voice-plugin-${TAG}.tar.gz" -C src/cli plugin/

      - name: Create GitHub Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release create "$TAG" \
            --title "recognize $TAG" \
            --generate-notes \
            "artifacts/release-arm64/recognize-${TAG}-arm64.tar.gz" \
            "artifacts/release-x86_64/recognize-${TAG}-x86_64.tar.gz" \
            "universal/recognize-${TAG}-universal.tar.gz" \
            "recognize-voice-plugin-${TAG}.tar.gz" \
            checksums.txt \
            src/cli/install.sh
